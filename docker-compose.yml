version: '3.8'

services:
  arangodb:
    image: arangodb:3.11
    container_name: rag-arangodb
    environment:
      - ARANGO_ROOT_PASSWORD=password
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - ./arango-init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "5000:5000"
    environment:
      - ARANGO_HOST=http://arangodb:8529
      - ARANGO_USERNAME=root
      - ARANGO_PASSWORD=password
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/conversations:/app/conversations
    depends_on:
      arangodb:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  arangodb_data:

networks:
  rag-network:
    driver: bridge